<svg viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" aria-labelledby="banner-title banner-desc"><title id="banner-title">diamond-lib — ERC-2535 Multi-Facet Proxy Library</title><desc id="banner-desc">A banner for the diamond-lib repository, depicting a faceted diamond representing the multi-facet proxy standard EIP-2535, with floating function selectors connected to facets.</desc><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0a1021"/><stop offset="55%" stop-color="#0d162b"/><stop offset="100%" stop-color="#09101e"/></linearGradient><linearGradient id="facetA" x1="0%" y1="0%" x2="60%" y2="100%"><stop offset="0%" stop-color="#d9fbeb"/><stop offset="55%" stop-color="#7ee3c2"/><stop offset="100%" stop-color="#3db496"/></linearGradient><linearGradient id="facetB" x1="0%" y1="0%" x2="80%" y2="100%"><stop offset="0%" stop-color="#5fc5a8"/><stop offset="100%" stop-color="#1e5f74"/></linearGradient><linearGradient id="facetC" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1e4e6e"/><stop offset="100%" stop-color="#0c243e"/></linearGradient><linearGradient id="facetD" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d2542"/><stop offset="100%" stop-color="#050f23"/></linearGradient><radialGradient id="diamondGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#1bd9a8" stop-opacity=".3"/><stop offset="45%" stop-color="#1bd9a8" stop-opacity=".08"/><stop offset="100%" stop-color="#1bd9a8" stop-opacity="0"/></radialGradient><pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r=".9" fill="#4d5e80" opacity=".35"/></pattern><filter id="softglow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.mono{font-family:ui-monospace,&quot;SF Mono&quot;,Menlo,Consolas,&quot;Courier New&quot;,monospace}.sans{font-family:system-ui,-apple-system,&quot;Segoe UI&quot;,&quot;Helvetica Neue&quot;,Arial,sans-serif}.tag{font-size:17px;fill:#a8b5ca;font-weight:400}.dim,.meta{font-size:10px;letter-spacing:.22em}.meta{fill:#7ddbc0;font-weight:600}.dim,.sel,.seldim{fill:#5a6a85;font-weight:500}.sel,.seldim{font-size:11px;fill:#7ddbc0}.seldim{fill:#7a8aa5}.chip{font-size:10px;letter-spacing:.18em;fill:#a8b5ca;font-weight:600}</style></defs><path fill="url(#bg)" d="M0 0h1280v400H0z"/><path fill="url(#dots)" d="M0 0h1280v400H0z"/><path d="M0 56h1280M0 344h1280" stroke="#fff" opacity=".05"/><path d="M24 40V24h20m1192 0h20v16M24 360v16h20m1192 0h20v-16" stroke="#7ddbc0" stroke-width="1.25" fill="none" opacity=".75"/><g class="mono"><text x="58" y="31" class="meta">EIP / 2535</text><text x="1232" y="31" class="meta" text-anchor="end">STANDARD · FINAL</text><text x="58" y="382" class="dim">◉ STATUS: STABLE</text><text x="1232" y="382" class="dim" text-anchor="end">MIT · © 2026 D.DADA</text></g><ellipse cx="280" cy="205" rx="230" ry="210" fill="url(#diamondGlow)"/><path fill="url(#facetC)" d="m220 96-59 68h59z"/><path fill="url(#facetB)" d="M220 96h60v68h-60z"/><path fill="url(#facetA)" d="M280 96h60v68h-60z"/><path fill="url(#facetB)" d="m340 96 59 68h-59z"/><path fill="url(#facetD)" d="M161 164h59l60 171z"/><path fill="url(#facetC)" d="M220 164h60v171z"/><path fill="url(#facetB)" d="M280 164h60l-60 171z"/><path fill="url(#facetC)" d="M340 164h59L280 335z"/><path d="M220 96h120l59 68-119 171-119-171zm-59 68h238M280 96v239M220 96v68m120-68v68m-120 0 60 171m60-171-60 171" stroke="#8febce" stroke-linejoin="round" fill="none" opacity=".9"/><path stroke="#d5fff1" stroke-width="1.75" opacity=".95" d="M220 96h120"/><path stroke="#fff" stroke-width=".75" opacity=".55" d="M285 102h50"/><g class="mono"><path d="M150 92h25l15 38" stroke="#7ddbc0" stroke-width=".75" fill="none" opacity=".55"/><circle cx="190" cy="130" r="2.25" fill="#7ddbc0"/><text x="28" y="96" class="sel">0x1f931c1c</text><text x="106" y="96" class="seldim">↗ diamondCut</text></g><g class="mono"><path d="m210 310 20-20-8-52" stroke="#7ddbc0" stroke-width=".75" fill="none" opacity=".55"/><circle cx="222" cy="238" r="2.25" fill="#7ddbc0"/><text x="28" y="314" class="sel">0xf2fde38b</text><text x="106" y="314" class="seldim">↗ transferOwnership</text></g><g class="mono"><path d="M410 92h-15l-15 38" stroke="#7ddbc0" stroke-width=".75" fill="none" opacity=".55"/><circle cx="380" cy="130" r="2.25" fill="#7ddbc0"/><text x="418" y="96" class="sel">0x7a0ed627</text><text x="496" y="96" class="seldim">↗ facets</text></g><path stroke="#2a3a58" stroke-dasharray="2 4" opacity=".5" d="M540 128v212"/><text y="140" class="sans" style="font-size:11px;letter-spacing:.26em;fill:#7ddbc0;font-weight:600" transform="translate(560)">ERC-2535 · MULTI-FACET PROXY STANDARD</text><text x="-5" y="220" class="sans" style="font-size:82px;font-weight:800;fill:#f2f6fa;letter-spacing:-.035em" transform="translate(560)">diamond-lib</text><text y="258" class="sans tag" transform="translate(560)">A modular, upgradeable smart contract framework.</text><text y="280" class="sans tag" fill="#7a8aa5" transform="translate(560)">Add · replace · remove functions at runtime — one immutable address.</text><g transform="translate(560 312)"><rect width="78" height="22" rx="2" fill="none" stroke="#2e4263"/><text x="39" y="15" class="sans chip" text-anchor="middle">SOLIDITY</text></g><g transform="translate(648 312)"><rect width="76" height="22" rx="2" fill="none" stroke="#2e4263"/><text x="38" y="15" class="sans chip" text-anchor="middle">FOUNDRY</text></g><g transform="translate(734 312)"><rect width="66" height="22" rx="2" fill="none" stroke="#2e4263"/><text x="33" y="15" class="sans chip" text-anchor="middle">ERC-165</text></g><g transform="translate(810 312)"><rect width="66" height="22" rx="2" fill="none" stroke="#2e4263"/><text x="33" y="15" class="sans chip" text-anchor="middle">ERC-173</text></g><g transform="translate(886 312)"><rect width="142" height="22" rx="2" fill="none" stroke="#1bd9a8" opacity=".9"/><text x="71" y="15" class="sans chip" fill="#1bd9a8" text-anchor="middle">3 FACETS · LOUPE</text></g><text class="mono" style="font-size:13px;fill:#1bd9a8;font-weight:600" transform="translate(560 354)">$</text><text x="16" class="mono" style="font-size:13px;fill:#c6d1e3;font-weight:500" transform="translate(560 354)">forge install dadadave80/diamond-lib</text><path d="M24 200h6m-6-40h4m-4 80h4m1222-40h6m-4-40h4m-4 80h4" stroke="#2e4263" opacity=".7"/></svg>