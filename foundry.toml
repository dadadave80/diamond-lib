[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    '@diamond/=src/',
    '@diamond-script/=script/',
    '@diamond-test/=test/',
]
optimizer_runs = 1_000_000
via_ir = false
ffi = true

[profile.ci]
optimizer_runs = 1_000_000
via_ir = false

[profile.ci.fuzz]
runs = 1024

[fmt]
sort_imports = true
